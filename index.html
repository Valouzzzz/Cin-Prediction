<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cin&Prediction</title>
<link rel="icon" type="image/png" href="icone.png">
<script src="directors.js"></script>
<script src="actors.js"></script>

<style>
body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}

h1 {
    text-align: center;
    margin: 20px;
}

.main {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    padding: 20px;
    width: 100%;
    max-width: 1200px;
    box-sizing: border-box;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 20px;
    width: 300px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.field {
    margin-top: 12px;
}

label {
    font-size: 0.85em;
    opacity: 0.8;
}

input {
    width: 90%;
    margin-top: 5px;
    padding: 8px;
    border-radius: 6px;
    border: none;
    background: #252f3e;
    color: white;
}

.dropdown {
    background: #1e293b;
    border-radius: 6px;
    margin-top: 5px;
    max-height: 120px;
    overflow-y: auto;
}

.dropdown div {
    padding: 6px;
    cursor: pointer;
}

.dropdown div:hover {
    background: #38bdf8;
}

.tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
}

.tag {
    background: #38bdf8;
    color: black;
    padding: 5px 8px;
    border-radius: 20px;
    display: flex;
    gap: 5px;
    font-size: 0.8em;
}

.tag span {
    cursor: pointer;
    font-weight: bold;
}

#valide {
    width: 100%;
    margin-top: 20px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(90deg, #38bdf8, #6366f1);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.result {
    text-align: center;
}

#note {
    color: #38bdf8;
    font-size: 1.2em;
    font-weight: bold;
}

#Recette {
    color: #4ade80;
    font-size: 1.2em;
}

@media (max-width: 768px) {
    .main {
        flex-direction: column;
        align-items: center;
        width: 100%;
        padding: 10px;
    }

    .card {
        width: 90%;
        max-width: 400px;
    }
}

.top-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    padding: 8px 14px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 10px;
    color: white;
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
    z-index: 1000;
}

.top-btn:hover {
    background: #38bdf8;
    transform: scale(1.05);
    box-shadow: 0 0 15px #38bdf8;
}
</style>
</head>

<body>
<a class="top-btn" href="prediction.html">HOME</a>
<br>
<h1>🎬 Movie Prediction</h1>

<div class="main">

<div class="card">

<div class="field">
<label>Title</label>
<input id="titre">
</div>

<div class="field">
<label>Runtime (minutes)</label>
<input id="duree" type="number" value="120">
</div>

<div class="field">
<label>Budget</label>
<input id="budget" type="number" value="10000000">
</div>

<!-- DIRECTORS -->
<div class="field">
<label>Directors</label>
<input id="rechercheRealisateurs" placeholder="Search...">
<div id="realisateursSelect" class="dropdown"></div>
<div id="realisateursTags" class="tags"></div>
</div>

<!-- CAST -->
<div class="field">
<label>Cast</label>
<input id="rechercheActeurs" placeholder="Search...">
<div id="acteursSelect" class="dropdown"></div>
<div id="acteursTags" class="tags"></div>
</div>

<!-- COUNTRIES -->
<div class="field">
<label>Countries</label>
<input id="recherchePays" placeholder="Search...">
<div id="paysSelect" class="dropdown"></div>
<div id="paysTags" class="tags"></div>
</div>

<!-- GENRES -->
<div class="field">
<label>Genres</label>
<input id="rechercheGenres" placeholder="Search...">
<div id="genresSelect" class="dropdown"></div>
<div id="genresTags" class="tags"></div>
</div>

<div class="field">
<label>Release Date</label>
<input id="dateSortie" type="date">
</div>

<button id="valide">Predict</button>

</div>

<div class="card result">
<h2>Rating</h2>
<p id="note">...</p>

<h2>Revenue</h2>
<p id="Recette">...</p>
</div>

</div>

<script>
function setupAutocomplete(inputId, dropdownId, tagsId, dataList, sendMap = null) {
    const input = document.getElementById(inputId);
    const dropdown = document.getElementById(dropdownId);
    const tagsContainer = document.getElementById(tagsId);

    let selected = [];

    input.addEventListener('input', () => {
        const value = input.value.toLowerCase();
        dropdown.innerHTML = '';

        if (!value) return;

        dataList
            .filter(item => item.toLowerCase().includes(value))
            .slice(0, 8)
            .forEach(item => {
                const option = document.createElement('div');
                option.textContent = item;

                option.onclick = () => {
                    if (!selected.includes(item)) {
                        selected.push(item);
                        renderTags();
                    }
                    input.value = '';
                    dropdown.innerHTML = '';
                };

                dropdown.appendChild(option);
            });
    });

    function renderTags() {
        tagsContainer.innerHTML = '';

        selected.forEach(item => {
            const tag = document.createElement('div');
            tag.className = 'tag';
            tag.innerHTML = `${item} <span>x</span>`;

            tag.querySelector('span').onclick = () => {
                selected = selected.filter(i => i !== item);
                renderTags();
            };

            tagsContainer.appendChild(tag);
        });
    }

    return () => {
        if (!sendMap) {
            return selected.join(', ');
        }

        return selected.map(item => sendMap[item] || item).join(', ');
    };
}

/* countries */
const listePays = ['United States of America', 'Australia', 'Algeria', 'Egypt', 'France', 'United Kingdom', 'Canada', 'Germany', 'Italy', 'Japan', 'Thailand', 'Denmark', 'Mexico', 'Czech Republic', 'Hong Kong', 'Belgium', 'Estonia', 'Finland', 'Sweden', 'Ukraine', 'Russia', 'Monaco', 'Spain', 'South Korea', 'Poland', 'Brazil', 'Luxembourg', '', 'China', 'Indonesia', 'Saudi Arabia', 'Israel', 'Morocco', 'Afghanistan', 'India', 'New Zealand', 'Switzerland', 'Holy See', 'Soviet Union', 'Hungary', 'Serbia', 'Romania', 'United Arab Emirates', 'Netherlands', 'Yugoslavia', 'Portugal', 'South Africa', 'Norway', 'Ireland', 'Turkey', 'Argentina', 'Austria', 'Latvia', 'Lithuania', 'Puerto Rico', 'Kenya', 'Cyprus', 'Greece', 'Bahamas', 'Taiwan', 'Bulgaria', 'Colombia', 'Vietnam', 'Iran', 'Bangladesh', 'Tunisia', 'Chile', 'Singapore', 'Qatar', 'Iceland', 'Czechoslovakia', 'Cambodia', 'Philippines', 'Serbia and Montenegro', 'Syrian Arab Republic', 'Malaysia', 'Dominican Republic', 'Peru', 'Liechtenstein', 'Venezuela', 'Lebanon', 'Slovakia', 'Uzbekistan', 'Guadaloupe', 'East Germany', 'Cuba', 'Georgia', 'Mauritius', 'Zimbabwe', 'Solomon Islands', 'Belarus', 'Ecuador', 'Senegal', 'Angola', 'Congo', 'Bolivia', 'Aruba', 'Haiti', 'Netherlands Antilles', 'Bosnia and Herzegovina', 'Jamaica', 'Uruguay', 'Libyan Arab Jamahiriya', 'Kuwait', "Cote D'Ivoire", 'Botswana', 'Costa Rica', 'Nicaragua', 'Martinique', 'Panama', 'St. Kitts and Nevis', 'North Korea', 'Montenegro', 'Burkina Faso', 'Mali', 'Ghana', 'Sri Lanka', 'Namibia', 'Barbados', 'Croatia', 'Malta', 'Slovenia', 'Guinea', 'Macedonia', 'Kazakhstan', 'Albania', 'Palestinian Territory', 'Malawi', 'Jordan', 'Central African Republic', 'Pakistan', 'Ethiopia', 'French Polynesia', 'New Caledonia', 'Nigeria', 'Kosovo', 'Iraq', 'Uganda', 'Mongolia', 'Cook Islands', 'Bhutan', 'Armenia', 'Cameroon', 'Bahrain', 'Tanzania', 'Myanmar', 'Madagascar', 'Rwanda', 'Cayman Islands', 'Guatemala', 'Macao', 'Liberia', 'Honduras', 'Timor-Leste', 'Chad', 'El Salvador', 'Paraguay', 'Turks and Caicos Islands', 'Papua New Guinea', 'Faeroe Islands', 'Zambia', 'Mauritania', 'Nepal', 'Gabon', 'Azerbaijan', 'Yemen', 'Greenland', 'Moldova', 'Oman', 'Sudan'];

/* genres shown in English */
const listeGenresEN = [
    'Comedy',
    'Animation',
    'Documentary',
    'Crime',
    'Drama',
    'Action',
    'History',
    'Music',
    'Romance',
    'Mystery',
    'Thriller',
    'Western',
    'Science Fiction',
    'Family',
    'Fantasy',
    'Adventure',
    'Horror',
    'War',
    'TV Movie'
];

/* genres sent in French */
const genresFRMap = {
    'Comedy': 'Comédie',
    'Animation': 'Animation',
    'Documentary': 'Documentaire',
    'Crime': 'Crime',
    'Drama': 'Drame',
    'Action': 'Action',
    'History': 'Histoire',
    'Music': 'Musique',
    'Romance': 'Romance',
    'Mystery': 'Mystère',
    'Thriller': 'Thriller',
    'Western': 'Western',
    'Science Fiction': 'Science-Fiction',
    'Family': 'Familial',
    'Fantasy': 'Fantastique',
    'Adventure': 'Aventure',
    'Horror': 'Horreur',
    'War': 'Guerre',
    'TV Movie': 'Téléfilm'
};

/* init */
const getPays = setupAutocomplete(
    'recherchePays',
    'paysSelect',
    'paysTags',
    listePays
);

const getGenres = setupAutocomplete(
    'rechercheGenres',
    'genresSelect',
    'genresTags',
    listeGenresEN,
    genresFRMap
);

const getRealisateurs = setupAutocomplete(
    'rechercheRealisateurs',
    'realisateursSelect',
    'realisateursTags',
    listeRealisateurs
);

const getActeurs = setupAutocomplete(
    'rechercheActeurs',
    'acteursSelect',
    'acteursTags',
    listeActeurs
);

/* API */
document.getElementById('valide').addEventListener('click', async function(event) {
    event.preventDefault();

    const data = {
        titre: document.getElementById('titre').value,
        duree: document.getElementById('duree').value,
        budget: document.getElementById('budget').value,
        realisateurs: getRealisateurs(),
        casting: getActeurs(),
        pays: getPays(),
        genres: getGenres(), // sent in French
        date_sortie: document.getElementById('dateSortie').value
    };

    try {
        const res = await fetch('https://swiftly-tiara-vividly.ngrok-free.dev/predict', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(data)
        });

        const result = await res.json();
        const note = parseFloat(result.note);

        let texte = '';
        if (note <= 3) texte = "Bad 😬";
        else if (note <= 5) texte = "Average 🤔";
        else if (note <= 7) texte = "Good 👍";
        else if (note <= 9) texte = "Very Good 🔥";
        else texte = "Excellent 🚀";

        document.getElementById('note').innerHTML = texte + " (" + note + "/10)";
        document.getElementById('Recette').innerHTML = result.recette + " $";

    } catch (err) {
        console.error(err);
    }
});
</script>

</body>
</html>
